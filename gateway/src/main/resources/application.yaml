server:
  port: 8080

spring:
  application:
    name: gateway
  cloud:
    gateway:
      server:
        webflux:
          routes:
            # Public auth endpoints
            - id: auth-public
              uri: lb://auth-service
              predicates:
                - Path=/auth/login,/auth/register
              filters:
                - StripPrefix=1

            # Protected auth endpoints
            - id: auth-protected
              uri: lb://auth-service
              predicates:
                - Path=/auth/**
              filters:
                - StripPrefix=1
                - name: JwtAuth

            - id: group-service
              uri: lb://group-service
              predicates:
                - Path=/group/**
              filters:
                - StripPrefix=1
                - name: JwtAuth

            - id: message-service
              uri: lb://message-service
              predicates:
                - Path=/message/**
              filters:
                - StripPrefix=1
                - name: JwtAuth
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

logging:
  level:
    root: INFO
    org.springframework.cloud.gateway: DEBUG
    com.netflix.discovery: WARN
    com.piggy.gateway.utils: DEBUG

